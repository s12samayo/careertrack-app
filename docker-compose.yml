services:
  postgres:
    image: postgres:16
    container_name: careertrack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s  
    networks:
      - database_network

  redis:
    image: redis:7
    container_name: careertrack-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s  
    networks:
      - database_network  

  pgadmin:
    image: dpage/pgadmin4
    container_name: careertrack-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - database_network

  backend:
    build: ./backend
    container_name: careertrack-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/').then(response => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s  
    networks:
      - backend_network
      - database_network


  frontend:
    build: ./frontend
    container_name: careertrack-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost/ || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s  
    networks:
      - frontend_network
      - backend_network  


volumes:
  postgres_data:
    external: true
    name: careertrack_postgres_data

networks:
  frontend_network:
    driver: bridge

  backend_network:
    driver: bridge

  database_network:
    driver: bridge    