name: CareerTrack Deploy

on:
  workflow_run:
    workflows:
      - CareerTrack CI
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on:
      - self-hosted
      - careertrack

    steps:
      - name: Pull latest backend image
        run: docker pull samayohub/careertrack-backend:latest

      - name: Pull latest frontend image
        run: docker pull samayohub/careertrack-frontend:latest

      - name: Deploy latest containers
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          cd ~/careertrack
          printf '%s\n' "$PROD_ENV_FILE" > .env.production
          chmod 600 .env.production
          docker compose --env-file .env.production -f docker-compose.prod.yml pull
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d

      - name: Verify running containers
        run: docker ps
