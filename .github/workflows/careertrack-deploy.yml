name: CareerTrack Deploy

on:
  workflow_run:
    workflows:
      - CareerTrack CI
    types:
      - completed

jobs:
  deploy:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on:
      - self-hosted
      - careertrack

    steps:
      - name: Check out successful CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy production configuration
        run: |
          mkdir -p ~/careertrack/database
          cp docker-compose.prod.yml ~/careertrack/docker-compose.prod.yml
          cp database/init.sql ~/careertrack/database/init.sql

      - name: Recreate production containers
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          if [ -z "$PROD_ENV_FILE" ]; then
            echo "PROD_ENV_FILE repository secret is not configured."
            exit 1
          fi
          cd ~/careertrack
          printf '%s\n' "$PROD_ENV_FILE" > .env.production
          chmod 600 .env.production
          docker compose --env-file .env.production -f docker-compose.prod.yml up \
            -d \
            --pull always \
            --force-recreate \
            --remove-orphans

      - name: Verify running containers
        run: |
          cd ~/careertrack
          docker compose --env-file .env.production -f docker-compose.prod.yml ps

      - name: Verify container health
        run: |
          docker ps

          echo "Waiting for healthchecks..."
          sleep 30

          docker ps    
