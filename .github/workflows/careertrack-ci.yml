name: CareerTrack CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker version
        run: docker --version

      - name: Validate Docker Compose file
        run: docker compose --env-file .env.example config --quiet

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend Docker image
        run: docker build -t samayohub/careertrack-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t samayohub/careertrack-frontend:latest ./frontend

      - name: Push backend image to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: docker push samayohub/careertrack-backend:latest

      - name: Push frontend image to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: docker push samayohub/careertrack-frontend:latest
